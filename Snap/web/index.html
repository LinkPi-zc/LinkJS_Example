<html>
<meta charset="UTF-8">
<body>
<div>
<img id="pic" src="snap/test.jpg"/>
</div>
<button id="snap">刷新</button>
<script src="js/jquery.min.js"></script>
<script src="js/jquery.jsonrpcclient.js"></script>
<script>
    function refresh(){
        var timestamp = new Date().getTime();
        $('#pic').attr('src', 'snap/test.jpg?' + timestamp);
    }
    refresh();
    $( "#snap" ).click( function ( e ) {
        var jsonrpc = new $.JsonRpcClient({ ajaxUrl: '/RPC9' });
        jsonrpc.call("script.callJsFunc", [{url:"/main/snap"}],function(){
            refresh();
        });
    });
</script>
</body>

</html>
