<table class="s6" width="100%">
    <tr>
        <td colspan="2">DHCP: {{dhcp}}</td>
    </tr>
    <tr>
        <td align="right">IP:</td>
        <td>{{ip0}}.{{ip1}}.{{ip2}}.{{ip3}}</td>
    </tr>
    <tr>
        <td align="right">SM:</td>
        <td>{{mask0}}.{{mask1}}.{{mask2}}.{{mask3}}</td>
    </tr>
    <tr>
        <td align="right">GW:</td>
        <td>{{gw0}}.{{gw1}}.{{gw2}}.{{gw3}}</td>
    </tr>
    <tr>
        <td align="right">DNS:</td>
        <td>{{dns0}}.{{dns1}}.{{dns2}}.{{dns3}}</td>
    </tr>
</table>
